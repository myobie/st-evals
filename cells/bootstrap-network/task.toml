# Onboarding eval — Bootstrap a fresh CoS network from scratch (the "Alex" path).
# NOT a team-SDLC cell. This tests the PLUMBING + DOCS a newcomer hits when standing up a
# smalltalk/CoS network from zero. Graded per-gate pass/fail; the DELIVERABLE is the friction
# list (every missing step / unclear default / manual fixup). See FRAMEWORK.md.
id    = "bootstrap-network"
title = "Bootstrap a fresh CoS network from scratch — the newcomer onboarding path"
tier  = 1
class = "system-setup / onboarding"           # distinct from the team-SDLC cells
axes  = ["gate-pass-fail", "friction-count"]   # the classic 6 axes don't apply here

evaluates = """
Whether a NEWCOMER (a human — the operator's friend Alex — or a freshly-spawned agent), from zero
and following the documented path, can stand up a working CoS network. Four gates, each pass/fail:
  A. init a NEW smalltalk network (a fresh ST_ROOT) and bring a CoS online (visible + available);
  B. the CoS runs its boot ritual — set status available, drain its inbox;
  C. the CoS spawns a NEW specialist agent (harness bootstrap: identity + .mcp.json + session + hooks);
  D. the CoS and the specialist exchange a message over smalltalk, end-to-end (correctly attributed).
The point is NOT that an expert can do it — we know the system works — but WHERE the documented
happy path diverges from reality, because that divergence is exactly the friction Alex will hit.
So the real output is the FRICTION LIST; fixing it is the deliverable. (Bonus, tested inline: HB-3 —
does a spawned agent resolve its OWN identity, not the launcher's leaked identity?)
"""

[method]
approach = """
Walk the documented newcomer path in a fresh hermetic ST_ROOT sandbox, trying the DOCUMENTED command
FIRST at each gate so its failure surfaces as a finding, then applying the workaround and proceeding.
Fully reproducible + self-asserting via the runner; every friction point is collected and printed.
"""
runner    = "cells/bootstrap-network/fixture/run.sh  [SANDBOX_DIR]   (exits 0 iff all 4 gates pass)"
hermetic  = "fresh ST_ROOT under ${EVAL_SANDBOX:-./.sandbox}/bootstrap-network each run; never the live network; fully offline."
live_vs_dry = "Gates A/B/D run LIVE against the real smalltalk (st) binary (real folders, real status, real message round-trip + an HB-3 kill-test). Gate C uses `st launch --dry-run` to inspect the generated bootable harness cheaply/offline; the autonomous-reasoning boot of a launched agent is an OPTIONAL live capstone."

[gates]
A = "fresh ST_ROOT -> CoS visible in `agents` as available"
B = "CoS status=available AND a seeded inbox message read + archived (inbox empties)"
C = "`st launch claude --identity <spec>` generates a bootable harness whose pty.toml sets the CHILD's ST_AGENT (HB-3 check)"
D = "CoS<->specialist message round-trip delivered + correctly attributed; a leaked launcher identity does not win over ST_AGENT"

[grader]
scoring = "per-gate pass/fail (not an axes score). PASS overall = all 4 gates green. The friction list is graded qualitatively: severity-ranked, each finding with what-the-newcomer-sees + a fix + an owner."
deliverable = "results/bootstrap-network/FRICTION.md — the severity-ranked friction list. This is the reason the eval exists."
held_out = "n/a — this is a white-box onboarding walk, not a solve-the-hidden-bug task. The 'held-out' equivalent is that the newcomer does NOT get to read the source — only the docs — so doc/reality gaps count as failures."

[observability]
report = "per-gate pass/fail + the full friction list (blockers first) + any positive findings (e.g. an identity-leak kill-test). Reported to the CoS when it lands; the friction list is handed to the bus maintainer."

# ── findings summary (2026-07-05 run; full detail in results/bootstrap-network/) ──
# VERDICT: PASS (all 4 gates) — but the documented happy path breaks at step 1.
#   BLOCKER  B1  `st` not on PATH (the bus CLI shipped under a different name); every doc says `st`.
#   BLOCKER  B2  `status --set` doesn't lazy-create the folder despite docs; first init command exits 1.
#   HIGH     H1  agent-onboarding.md stale — 7 manual steps, never mentions `st launch`.
#   HIGH     H2  no init-network/onboard-agent command; folder creation is manual + tribal.
#   HIGH     H3  `st launch` bakes an absolute hook path -> dangles if checkout moves -> boot ritual silently dead.
#   MEDIUM   M1  lazy-create inconsistent across verbs (send auto-creates, status doesn't).
#   LOW      L1  no `st --version`.
#   LOW      L2  CLI papercuts (--enrich needs --json; no CLI reply; read header->stderr).
#   POSITIVE P1  HB-3 (identity leak on launch) effectively FIXED — launch writes child's ST_AGENT; it wins.
