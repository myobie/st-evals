# Team-eval — Ding-mode (NO-MCP PARTICIPATION). Work-type: joining + coordinating on the network without MCP.
# Both agents are launched `st launch claude --ding`: no MCP wiring, an `st ding` sidecar for inbound, the
# `st` CLI for all bus ops. Discriminator: is ding-only a FIRST-CLASS experience (good boot / clean [DING]
# handling / natural coordination @ 0 rescues) — NOT just "a message was delivered". The no-MCP shape.
id    = "ding-mode"
title = "A fully no-MCP Claude team coordinates a real task over ding + the st CLI"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a Claude team launched WITHOUT MCP (`st launch claude --ding`) is a first-class network participant.
The load-bearing case is an MCP-less host: MCP servers don't run at all, so a Claude CoS must join via the
ding sidecar (inbound messages arrive as `[DING] `-prefixed pokes) + the `st` CLI (send/ls/read/reply/archive/
status) — codex-style. A ding-mode claude gets NO MCP system-prompt, so nothing tells it it's on a bus or how
to participate: it gets that from the DING-BUS.md contract that `st launch --ding` auto-installs (#61),
imported via `@DING-BUS.md` in CLAUDE.md — the shipped ding-mode analog of the MCP channel instructions.
This eval measures whether that SHIPPED contract makes the agent genuinely competent — i.e. whether
"ding-only" is good, not a degraded fallback.

The task is small + deterministic (implement slugify(text) to an exact spec) so the FOCUS is the ding-mode
coordination experience, not task difficulty. A 2-agent team runs the smallest real loop: dm-sup (coordinate-
only) boot-drains the seeded kick over the CLI, delegates to dm-dev over the bus; dm-dev receives a live
[DING], reads it via CLI, implements + commits + reports; dm-sup verifies read-only + confirms. The held-out
grade is the EXPERIENCE, mechanized from ground truth: (a) boot ritual ran without MCP (the kick got drained
to archive over the CLI), (b) the [DING]-delivered delegation was handled cleanly (read + archived + replied),
(c) the delegate->report->confirm loop is natural and bus-visible — plus the task is correct (slugify meets
spec, suite green) and isolation holds (only the owner commits). Rescues (a human poking/un-sticking an agent)
= 0 is the headline; any rescue means ding-only was NOT yet a first-class experience.
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/ding-mode/widget  (widget lib; owned by dm-dev, distinct git author)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/ding-mode/sup  (dm-sup; coordinate-only, owns NO repo)"
task        = "implement slugify(text) in src/slug.js to an exact spec (lowercase; trim; runs of non-alphanumerics -> single dash; strip leading/trailing dashes)"
start_state = "GREEN suite (module-shape test); slugify is a stub that throws until implemented"
builder     = "fixture/setup-sandbox.sh (deterministic; validates green-suite + stub-throws on build)"

[team]
dm-sup = "supervisor (manager persona), Claude `st launch claude --ding` --permission-mode bypassPermissions, coordinate-only, NO MCP"
dm-dev = "specialist (specialist persona), Claude `st launch claude --ding` --permission-mode auto, owns the widget repo, NO MCP"
posture = "the operator's rule: SUPERVISOR=bypass, WORKER=auto. Ephemeral: role=agent, no strategy=permanent (agent AND ding sidecar)."
kick   = "hermetic task request seeded into dm-sup's inbox (fixture/kick-supervisor.md) — says NOTHING about ding/MCP"
ding_mode = "CRUX: a --ding claude gets no MCP system-prompt. `st launch --ding` auto-installs the bus contract as DING-BUS.md (#61) — an @DING-BUS.md import in CLAUDE.md (no MCP tools; inbound = [DING] pokes; ALL bus ops via the st CLI; CLI boot ritual). The eval reveals whether that SHIPPED contract is sufficient; the persona no longer hand-carries it."

[launch]
capability   = "st launch claude --ding (#58): no MCP wiring (.mcp.json skipped), channel off, an `st ding` sidecar per agent for inbox delivery, Claude hooks (SessionStart/PreCompact/StopFailure) still generated. Unattended delivery is load-bearing on #61 (DING-BUS.md auto-install) + #62 (sidecar survives the launch race) + #63 (sidecar targets the FQN <id>-<session> pty key, not the bare session-name) — all landed 2026-07-05; verified via a 0-poke autonomous loop-close."
sessions     = "per agent: the claude session (<id>-<stev-prefix>) + a ding sidecar (<id>-ding). BOTH are stev_track_extra'd so teardown is zero-orphan."
isolation    = "st launch bakes the isolated ST_ROOT into BOTH sessions' env -> agent + ding bind the isolated bus; the live network is untouched."
known_gap    = "as of #58, .claude/settings.local.json still writes enabledMcpjsonServers:['st'] + enableAllProjectMcpServers even in ding mode (while .mcp.json is skipped) — a dangling MCP ref that should be dropped for a true no-MCP box. Flagged upstream; harmless in the isolated run (nothing to connect) but the NO-MCP grade gate asserts on .mcp.json absence, not settings keys."

[isolation]
enforce = "dm-sup owns no repo (structural — its dir is not a git repo, cannot commit); dm-dev owns widget only"
detect  = "post-run, attribute every commit — only dm-dev@eval.local may author (+ the evals-seed base). A non-owner/foreign author FAILS the run."

[grader]
visible_tests       = "the widget suite stays green (the team sees + runs `npm test`)"
held_out_acceptance = "run at grade time, never seen: (1) TASK CORRECT — slugify meets the spec on held-out cases (run, not eyeballed) + suite green; (2) NO MCP — neither agent dir has a .mcp.json; (3) BOOT WITHOUT MCP — the kick was drained to dm-sup's archive over the CLI; (4) [DING] HANDLED — dm-dev read+archived the delegation AND replied; (5) COORDINATION — delegate->report->confirm loop bus-visible. Mechanized in fixture/grade.sh."

[quality]
type   = "llm-judge (cross-family) + human read of the bus loop"
method = "did the ding-mode team coordinate NATURALLY (clear delegation, clean handoff, real verification) or clumsily (missed [DING]s, inbox left undrained, redundant pokes)? Is slugify idiomatic? The 'is ding-only good?' read."

[autonomy]
metric = "rescues (a human poking/un-sticking an agent, or telling it how to use the CLI) — target 0. THE headline: any rescue means ding-only is not yet first-class. The --unattended startup gates are scenario pokes, not rescues."

[cost]
metric = "tokens + wall-clock for the team. (Deferred instrumentation per suite policy.)"

[coordination]
signal = "the whole delegate->execute->report->verify loop over ding + CLI, bus-visible. Compare against the MCP-native cells (e.g. license-mit) for whether ding-only degrades the coordination experience."

[observability]
report = "per-agent trajectory over ding; did each boot-drain cleanly; [DING] handling; parks/rescues; coordination quality; the known settings.local.json MCP-ref gap. Emit results/ JSON + report to cos. This run also doubles as the acceptance test for st launch claude --ding (#58)."
