# Cell — first-run: the REAL "stand this up on your machine" onboarding chain.
# Extends bootstrap-network with the two pieces that make it the onboarding a stranger actually does:
# consume the PUBLIC personas repo (SHA-pinned, read-only) and run the FIRST-RUN INTERVIEW (scripted
# principal) → a working PRIVATE CoS repo. The headline is the NO-LEAK gate.
id    = "first-run"
tier  = 1
type  = "onboarding"
axes  = ["task-success", "isolation", "autonomy"]   # graded per-gate pass/fail, not the 6-axis rubric

evaluates = """
Whether a newcomer can go from zero to a working, network-joined chief-of-staff using ONLY the public
contract: clone the public `personas` repo pinned to a fixed SHA (read-only), run the first-run
interview driven by a scripted principal (non-interactive, replayable setup), and end with a committed
PRIVATE cos repo that joins a fresh network. The discriminating gate is P3 — NO-LEAK: the private repo
carries the principal's data, the public personas checkout carries ZERO of it and is byte-for-byte
unmodified at the pin. That proves the public/private split: private data comes from the interview,
never the public repo, and nothing leaks back.
"""

[setup]
personas_url = "https://github.com/compoundingtech/personas"
personas_pin = "f12458a3a0139ab31bcad7c8b3a9f5750f873a97"   # bump deliberately; reproducibility = this pin
principal    = "fixture/principal-answers.env — a fully SYNTHETIC indie dev (Jordan Rivera); zero real PII"
runner       = "fixture/run-real-path.sh [SANDBOX] — self-asserting; exit 0 = every gate PASS; friction is a finding, not a failure"

[gates]
P0  = "consume public personas, SHA-pinned, read-only (needs network ONCE; everything after is offline)"
P1  = "first-run detection — a fresh repo (no populated identity.md) triggers the interview"
P2  = "run the interview (scripted principal) → identity.md / team.md / priorities.md / comms.md committed"
P3  = "NO-LEAK — private repo has the principal's data; the personas checkout has none + is unmodified at the pin"
P1b = "idempotency — a populated repo makes the interview SKIP (never re-runs / clobbers)"
NET = "the interviewed CoS comes online in the fresh network"

[deliverable]
report = "verdict (all gates PASS?) + the severity-ranked friction list on the interview + consumption contract"
