# Cell — team-standup: prove the CoS can stand up a WORKING team, not just itself.
# Extends bootstrap-network → first-run with the same synthetic Jordan principal + taskflow repo.
id    = "team-standup"
tier  = 2
type  = "team-formation"
axes  = ["isolation", "task-success", "autonomy", "coordination"]   # per-gate pass/fail + 6-axis signals

evaluates = """
Onboarding proves you can stand up the MANAGER (a chief-of-staff). It does NOT prove the manager can stand
up a WORKING TEAM — and a CoS with no specialists accomplishes nothing. This cell proves the team: the
interviewed CoS (a) STANDS UP a specialist for a repo via `st launch` (lazily, on first work for that repo),
(b) DELEGATES a clear self-contained brief over the bus (it does NOT do the work itself), (c) the specialist
does the work in its OWN repo only, commits, and reports, and (d) the CoS WALKS the result read-only and
confirms — verifying, not rubber-stamping. Isolation is the hard gate, and the whole delegate→execute→
report→walk loop must be visible on the message bus (no out-of-band coordination).
"""

[setup]
personas_url = "https://github.com/compoundingtech/personas"
personas_pin = "f12458a3a0139ab31bcad7c8b3a9f5750f873a97"   # bump deliberately; reproducibility = this pin
principal    = "the synthetic Jordan world from bootstrap/first-run — a small GREEN `taskflow` repo that the CoS stands up a specialist (`taskflow-dev`) to own"
sandbox      = "fixture/setup-sandbox.sh [SANDBOX] — a fresh ISOLATED bus root ($SB/st-root, never your live network) + the taskflow repo + the CoS's team.md roster"
runner       = "fixture/spin.sh [SANDBOX] — composes the CoS + specialist personas (pinned public personas), wires the CoS spawn-capable, seeds the delegated task, and launches ONLY the CoS (which stands up the specialist itself — that IS the test)"
grader       = "fixture/grade.sh [SANDBOX] — ground-truth: git metadata + an INDEPENDENT completeTask behavior probe + the bus message files; never trusts self-reports"

[gates]
P4 = "standup mechanics (hermetic/dry) — fixture/gate-p4.sh: `st launch --dry-run` writes the CHILD's ST_AGENT (HB-3 mitigated) + wires the asyncRewake boot hook; the CoS records the stood-up specialist in team.md (MERGE, not clobber); isolation precondition (CoS owns no repo). Deterministic + offline."
P5 = "the LIVE proof — the CoS delegates a real unit (add `completeTask(id)` + a test to `taskflow`), the specialist executes in its own repo + reports, the CoS walks it read-only + confirms. Graded on: isolation, task-correct, suite-green, mutation-valid regression test, bus-visible coordination, and CoS-verified-not-rubber-stamped."

# ISOLATION — the HARD GATE, checked before anything else.
[isolation]
enforce = "the specialist owns ONLY the taskflow repo; the CoS owns NO repo (its dir is not a git repo, so it structurally cannot commit)."
detect  = "post-run, attribute every taskflow commit to its author — only the specialist (taskflow-dev@eval.local) may have authored; any other author FAILS the run."
prove   = "the delegate→report loop must be visible on the bus (a cos→specialist brief AND a specialist→cos report). A committed change with no coordinating messages = out-of-band work, investigate."
verdict = "PASS/FAIL gate — a violation fails the whole run regardless of task-success."

# GRADER — visible-for-dev, held-out-for-grade.
[grader]
visible_tests       = "the taskflow suite must stay green (the team runs `npm test`)."
held_out_acceptance = "an INDEPENDENT probe the team never sees: completeTask(id) BEHAVES — a known id returns the task marked done; an unknown id THROWS (no silent no-op) — AND the added regression test is MUTATION-VALID (it goes RED on the base src that lacks completeTask, GREEN on the fix). A unit-test edit can't fake this."

[quality]
type   = "the discriminator is the LOOP, not the code. completeTask is trivial; what's graded is: did the CoS delegate (not do it itself), did the specialist stay in its lane + walk its own work, did the CoS VERIFY (re-run the tests) rather than rubber-stamp, and is every handoff on the bus?"

[deliverable]
report = "verdict (P4 + P5 PASS?) + a friction list — especially `st launch` ergonomics for UNATTENDED standup (dev-channels gate, child folder-trust / project-MCP enable, pty-prefix-vs-identity)."
