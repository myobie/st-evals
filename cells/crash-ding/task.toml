# crash-ding — convoy up dings the orchestrators when a NON-PERMANENT WORKER crashes, harness-agnostic (codex + claude).
id    = "crash-ding"
title = "A crashed non-permanent worker's session death produces a real crash ding to cos + the supervisor tier — for BOTH codex and claude — and a clean worker exit stays SILENT"
tier  = 1
axes  = ["isolation", "task-success", "autonomy", "coordination"]

evaluates = """
The events/notifications path: when a supervised NON-PERMANENT worker CRASHES (its pty session dies with a
nonzero exit or vanishes), `convoy up`'s reconcile loop sends an immediate `st message` (ding) to the
orchestrator tier (cos + all permanent supervisors) so a supervisor learns its worker died without polling —
detect-only, NO respawn (workers are ephemeral / Nomad). Harness-agnostic by construction: it keys on the pty
SESSION dying, so the SAME edge fires for a real Codex worker AND a real Claude worker. Two halves, both hard:
(a) a real worker crash -> a REAL ding (an actual st message on the bus, from convoy-up, subject "worker crash:
<id>", naming the worker) reaches cos AND the supervisor; (b) a CLEAN worker exit (code 0 = the worker finished
its task) produces NO ding — a supervisor spammed on every clean finish stops trusting the signal, so a false
ding on a routine exit is as bad as a missed crash.
"""

[setup]
net       = "${EVAL_SANDBOX:-/tmp}/cd-<harness>/net  (isolated convoy network; never the live one)"
members   = "cd-cos (cos, --permanent) + cd-sup (supervisor, --permanent) = the ding recipients (the permanent orchestrator tier; convoy has no spawner/owner tag in v1, so a worker crash dings cos + ALL permanent supervisors, not a single owner). cd-wk = a NON-permanent REAL worker (--harness codex|claude) crashed VANISHED (the harness-agnostic path); cd-oom = a NON-permanent SYNTHETIC worker that exits 137 (proves the nonzero-exit gate branch deterministically — a real harness worker can't be scripted to exit(N)). cd-clean = the negative control: a NON-permanent synthetic worker that exits 0."
harnesses = "RUN TWICE: workers as codex, then as claude. BOTH must ding on crash (the harness-agnostic path must actually be harness-agnostic — a claude-only ding is a FAIL)."

[scenario]
crash = """
workerCrashed() = status "vanished" || (status exited && exitCode != 0) — a vanished session OR a nonzero exit
dings, a clean exit 0 stays silent. The cell proves all three gate outcomes:
  cd-wk    (real codex|claude worker) crashed VANISHED — SIGKILL the pty DAEMON so no exit record is written.
  cd-oom   (SYNTHETIC worker) EXITS 137 — a nonzero/abnormal exit, deterministically hitting the `exitCode != 0`
           branch. It proves that branch FIRES; it is NOT itself an OOM (see the A/B scope below).
  cd-clean (synthetic worker) EXITS 0 — silent.
OOM SCOPE (reconciled with pty-claude + convoy-claude; pty PR #72 merged). An exit record can't by itself name a
signal, so "does the gate catch an OOM?" splits in two:
  Case A — the worker's OWN pty-spawned process is OOM/SIGKILL-killed. node-pty reports signal=9; pty #72 now
    surfaces exitCode = 128+9 = 137 (previously the signal was dropped and it recorded exit 0). So a real Case-A
    OOM lands on the SAME nonzero branch cd-oom proves -> convoy dings, with NO convoy change. The common case.
  Case B — a grandchild is OOM-killed while the pty-spawned PARENT reaps it and exits 0. node-pty sees exit 0 /
    no signal, byte-identical to a clean finish -> SILENT. A DOCUMENTED BLIND SPOT, not a pty bug: catching it
    needs OS-level detection (dmesg / cgroup memory.events), tracked as a follow-up.
Why synthetic for the exit-code branch: a real harness worker can't be scripted to exit(N), so cd-oom is a
synthetic exit-137 worker that hits the branch deterministically; cd-wk (a real worker) exercises the harness-
agnostic VANISHED path. NON-permanent -> convoy up detects gone + DINGS, no respawn.
"""
negative = "cd-clean is a hand-written pty.toml worker (`sleep; exit 0`) carrying the ptyfile.session tag + ST_AGENT + NO strategy=permanent — exactly what convoy up keys a worker on. It exits 0 (a clean finish); convoy up marks it seen but sends NO ding. The grader ALSO asserts cd-clean was a DETECTED convoy worker (ptyfile.session + non-permanent + exit 0) so the silence is provably 'gated as clean', not 'invisible' (no false pass)."

[grader]
mechanical = """
fixture/grade.sh <harness> — REAL bus state, never a log-only claim. Hard gates:
  REAL CRASH — a worker_crash event for cd-wk (its non-permanent session actually died).
  POSITIVE — a "worker crash: cd-wk" ding FROM convoy-up in BOTH cd-cos's AND cd-sup's inbox (asserted from the
    delivered inbox files, not the event log).
  NEGATIVE — cd-clean (clean exit 0) produced NO "worker crash: cd-clean" ding in ANY inbox (a false ding = FAIL).
  ISOLATION — nothing in the global/prod pty root.
fixture/run.sh runs BOTH harnesses; a pass requires both (claude-only ding = FAIL).
"""
hermetic = "isolated convoy net per harness; the delivered ding message files on the bus ARE the ground truth."

[integrity]
note = """
PASS = a REAL worker crash (session verifiably died) produced a REAL ding (an actual st-message file) to the
REAL orchestrators (cos + supervisor), for a REAL codex worker AND a REAL claude worker — and a clean worker
exit produced NONE. Not a mocked event, not a log scrape, not convoy's injected-runner unit tests. A false PASS
(asserting from the event log, missing the codex leg, or tolerating a clean-exit ding) is worse than a FAIL.
"""

[reuse]
note = "Crash-injection + convoy up hosting adapted from the convoy-network capstone. v1 dings cos + ALL permanent supervisors (no owner tag yet); targeting the specific OWNING supervisor is a convoy follow-up (needs a spawned-by tag). A secondary permanent-agent crash case (crash:/flapping: dings, validated separately) exists in git history. FOLLOW-UPS: (1) now that pty #72 surfaces exitCode 137 on a direct signal death, prove Case A with a REAL SIGKILL'd worker (record 137) and retire the synthetic-only exit-137 — pty's tests/exit-signal.test.ts is the reference repro (spawn `sh -c 'exec sleep 300'` so the pty-spawned process IS the target, pgrep -P the daemon, kill -9 the leaf, assert exitCode 137 / signal 9). (2) Case B (a reaped-grandchild OOM under a surviving parent = exit 0) is not gate-reachable and needs OS-level detection (dmesg / cgroup memory.events)."
