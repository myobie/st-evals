# Cell: signal-rename — the coordination crown-jewel, in a fully SYNTHETIC + hermetic graph.
# A manufactured cross-repo PRODUCT rename with a planted product-vs-primitive trap. Nothing here
# is a real repo; setup-sandbox.sh materializes the whole graph at fixed content in an isolated
# sandbox. See cells/signal-rename/README.md + the design in the private evals repo.
id    = "signal-rename"
title = "Rename the `signal` PRODUCT to `beacon` across a synthetic base package + 2 consumers + config"
tier  = 2   # team eval (multi-repo, agent-tree) — 4 agents (sup + a specialist per repo)
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

# REQUIRED: what this eval is actually evaluating, and why.
evaluates = """
Whether a TREE of agents (a supervisor + a specialist per repo) can carry out a coordinated cross-repo
rename of a PRODUCT named `signal`, rippling from a base package (@acme/signal + its `signal` bin) out to
every consumer (signal-relay peer-depends on it; signal-hub drives `signal` sessions + a `signal://`
resource scheme) plus a config sweep (app.toml) — while keeping every suite green and the system working
end-to-end. It forces the three skills a real factory needs: DECOMPOSITION (who owns which repo),
SEQUENCING (you cannot rename the base package without breaking consumers until they're updated — so order
+ a backward-compat/alias window matter, exactly like the coord->smalltalk dual-honor cutover), and
JUDGMENT (the word `signal` ALSO names a ubiquitous primitive — the OS signal + AbortSignal/controller.signal
— renaming THAT breaks everything; a blind find-replace fails this task and the quality judge catches it).
The held-out invariant — the renamed stack still launches, the relay still connects over the new scheme,
an identity still resolves — is a cross-repo end-to-end check the team can't game by editing a unit test.
This is the crown-jewel coordination eval: if the tree can do this cleanly with few rescues, the system is real.
It is the PUBLIC, synthetic twin of a real cross-repo rename — invented from scratch so it ships with zero PII.
"""

# Frozen world: setup-sandbox.sh MATERIALIZES each repo (it is not cloned). base_commit is n/a — the
# fixture content IS the frozen world. NEVER touches anything outside the sandbox.
[[repos]]
repo = "acme/signal"
role = "base package — rename @acme/signal + the `signal` bin; the change everything else depends on"

[[repos]]
repo = "acme/signal-relay"
role = "consumer — peerDependency @acme/signal; MANY `signal` refs, DELIBERATELY interleaving PRODUCT refs (rename) with PRIMITIVE refs (AbortSignal / controller.signal / SIGTERM handlers — do NOT rename). The judgment-heavy repo."

[[repos]]
repo = "acme/signal-hub"
role = "consumer — drives `signal` sessions + the `signal://` resource scheme (-> `beacon://`); product refs rename, OS-signal handling survives"

# app.toml (the product config) is the satellite config sweep — the supervisor's own.

[rename]
from        = "signal (the product / @acme/signal / the `signal` binary)"
to          = "beacon"   # ARBITRARY — the eval doesn't care what, only that the ripple is handled. Swap freely.
do_not_touch = "the OS signal primitive + AbortSignal / controller.signal / SIGTERM handlers (renaming the primitive is the trap this task tests for)"

# The brief the supervisor receives. Tests are VISIBLE (real-world); the held-out acceptance is not.
brief = """
Rename our product from `signal` to `beacon` across the whole synthetic stack:
- signal (base): the npm package (@acme/signal -> @acme/beacon), the `signal` CLI binary, README/docs, internal
  product references.
- signal-relay: the peerDependency, all PRODUCT imports/references, docs. The relay becomes the `beacon` relay.
- signal-hub: the product references + the `signal://` resource scheme (-> `beacon://`).
- config: app.toml and any docs that name the product.
CRITICAL: `signal` also names a primitive — the OS signal and AbortSignal/controller.signal. Do NOT rename the
primitive — only the product. Keep every repo's test suite green. Sequence the cutover so consumers never
reference a name the base package no longer provides (a backward-compat/alias window is acceptable, mirroring a
dual-honor cutover). Report how you decomposed it and any problems you hit.
"""

[team]
supervisor  = "owns the cross-repo task + the app.toml config sweep; decomposes, sequences, drives to green; owns NO product repo"
specialists = "one specialist per package (signal / signal-relay / signal-hub), each owning ONLY its own package DIRECTORY in the shared workspace, coordinating over real st + pty"
note        = "4-agent tree; spawned FRESH but WITH the personas. The graph is a WORKSPACE (monorepo: base package + 2 consumers + config, one directory each) so the consumers resolve the base with zero install; isolation is per-package-dir path attribution."

# ISOLATION — the HARD GATE, checked before anything else.
[isolation]
enforce  = "each specialist owns ONE package directory in the shared workspace (sig-base: signal/ ; sig-relay: signal-relay/ ; sig-hub: signal-hub/); the supervisor owns config/ (app.toml) + the workspace root + integration"
detect   = "post-run, attribute every commit to its author + assert its files stay in that author's package-dir lane (per-package-dir path attribution); any out-of-lane change FAILS the run outright"
prove    = "the base rename must ripple to the consumers BY MESSAGE (base agent: 'renamed, bump your peerDep'), visible in the st message log; a consistent renamed state with NO coordinating messages = suspected out-of-band coordination, investigate"
verdict  = "PASS/FAIL gate — a violation fails the whole run regardless of task-success/quality"

# GRADER — visible-for-dev, held-out-for-grade.
[grader]
visible_tests        = "each repo's own suite must stay green (the team sees + runs these; npm test per repo)"
held_out_acceptance  = "ISOLATED end-to-end run of the RENAMED stack: a `beacon` session launches under the new bin, signal-hub connects over `beacon://`, an identity resolves — AND the primitive is intact (a test that exercises AbortSignal/SIGTERM still passes). A cross-repo invariant a unit-test edit can't fake. (The team does NOT see this check.)"
hermetic             = "MUST run on the materialized synthetic graph in an isolated sandbox — never a live system."

[quality]
type   = "llm-judge (cross-family — a Claude judge inflates Claude's work ~4-7pts)"
method = "did they rename the PRODUCT and leave the primitive (OS signal / AbortSignal) intact? minimal/idiomatic? real docs+tests updated, not weakened? no blind find-replace damage? was the base-before-consumers sequencing + a compat window handled?"

[autonomy]
metric = "rescue-interventions per run (planned-gate vs rescue); rescue-count is the headline factory metric"

[cost]
metric = "tokens + wall-clock for the whole tree"

[observability]
report = "per-agent trajectory; problems (parks, errors, conflicts, escalations); the intervention log; coordination (decomposition quality, SEQUENCING, handoffs, conflicts)."
