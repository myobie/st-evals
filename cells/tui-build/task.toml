# Cell — tui-build: a team builds a real terminal UI over an agent network + a usability pass.
id    = "tui-build"
tier  = 2
type  = "greenfield-build"
axes  = ["isolation", "task-success", "quality", "autonomy", "coordination"]

evaluates = """
Whether a TREE of agents (an integration lead + two view specialists + a usability reviewer, on real pty +
smalltalk) can BUILD a real product collaboratively and make it USABLE — not just make it render. The team
takes two seed prototype views (tree+preview, cards+preview, on `@compoundingtech/pty/tui`) and: builds ONE shared
read-only data layer (`st agents --enrich --json` + the message dir), wires both views to it, keeps the
suite + typecheck green, and — the discriminator — runs a real HUMAN-CENTERED usability pass that FINDS the
problems a mock never shows (statuses the seed type doesn't model, overflow/truncation, empty states,
cold-readability, navigation) and FIXES them. "It renders the mock" is table stakes; "it's usable on the
real network" is the bar. Isolation is the hard gate: each agent touches only its own module; the reviewer
writes no code; all coordination is on the bus.
"""

[setup]
seed        = "fixture/seed-protos/ (bundled) — proto-5 tree+preview, proto-6 cards+preview, a SYNTHETIC mock (data.ts), and the live-network fetch (agent-network.ts). setup-sandbox.sh lifts the `../../src/tui/*` imports to the published `@compoundingtech/pty/tui` seam."
fixture     = "fixture/generate-fixture.sh — a frozen SYNTHETIC network (invented roster) the built viz reads for tests + hermetic grading. Deliberately plants the usability edge cases (an `away` status the seed type omits, an overflow inbox of 12, dnd/offline/empty, a stale-mtime `unknown`). Regenerate at render time (mtimes matter)."
sandbox     = "fixture/setup-sandbox.sh [SANDBOX] — seeds the agent-viz repo (bare origin + one clone per agent, distinct authors) + materializes the frozen fixture."
runner      = "fixture/spin.sh [SANDBOX] — composes the 4 personas, wires them (asyncRewake + pre-trust), seeds the hermetic build request into tui-sup's inbox, launches (workers first, sup last)."
grader      = "fixture/grade.sh [SANDBOX] — mechanizes isolation + suite-green + wired-to-real-data + status-coverage; defers cold-nav + usability to a render + fixture/usability-rubric.md."

[team]
sup   = "tui-sup (technical-manager) — owns the shared data layer (src/data/) + integration on main; coordinates; drives the usability find→fix loop. Owns no view."
tree  = "tui-tree (specialist) — owns src/views/tree/ only."
cards = "tui-cards (specialist) — owns src/views/cards/ only."
ux    = "tui-ux (specialist/reviewer) — owns NO code; human-centered usability review only."

[isolation]
enforce = "each specialist owns exactly one module (its own clone/branch); tui-sup owns the shared layer + integration; tui-ux owns no code."
detect  = "post-run, attribute every commit to its author + its changed paths — tui-tree only src/views/tree, tui-cards only src/views/cards, tui-sup only the shared layer/integration, tui-ux ZERO commits. An out-of-lane change or a tui-ux commit FAILS the run."
prove   = "the build + the find→fix loop must be visible on the bus (briefs, findings, handoffs); a usability fix must be authored by the module's OWNER, not the reviewer."
verdict = "PASS/FAIL gate — a violation fails the whole run regardless of task-success/quality."

[grader]
visible_tests       = "npm test + tsc --noEmit stay green (the team runs these); both views render the frozen fixture."
held_out_acceptance = "COLD-NAVIGATION: a fresh reader, from the built view alone (rendered against the frozen fixture), can tell who's around, who has unread, and read the selected agent's latest message — in BOTH views. Plus the USABILITY find→fix score against fixture/usability-rubric.md (the team never sees the rubric)."

[quality]
type   = "the discriminator is the USABILITY find→fix loop, not that it renders. cross-family judge preferred for the usability score (a Claude judge inflates Claude work ~4–7 pts)."
method = "did they find + FIX the planted problems — especially the statuses the seed type never modeled (away/busy/dnd) and cold-readability — routing each fix to the module owner and re-reviewing? See fixture/usability-rubric.md."

[deliverable]
report = "verdict (isolation + task-success + usability) + how the team split it + the usability problems found and what changed because of them."
