# Cell: compose-config-load — a repo's OWN CLAUDE.md + skills still LOAD and WORK after a convoy agent is composed
# into it. `convoy add --dir <repo>` writes an additive CLAUDE.local.md (which @-imports PERSONA.md + DING-BUS.md)
# ALONGSIDE the repo's tracked CLAUDE.md — it does NOT clobber it — and the repo's project skills auto-load via
# --dir. This cell proves + guards that: the repo's own config survives the compose and the agent follows it.
#
# WHY THIS EXISTS (Nathan mandate). "A composed agent's own CLAUDE.md + skills still load and work." If convoy's
# CLAUDE.local.md replaced the repo CLAUDE.md, or the compose shadowed the project skills, an agent working in a
# real repo would silently lose that repo's instructions. This is the held-out proof it does not.
id    = "compose-config-load"
title = "A repo's own CLAUDE.md + skills load through the convoy compose (CLAUDE.local.md is additive, not a clobber)"
tier  = 1
axes  = ["isolation", "task-success", "autonomy"]

evaluates = """
Whether an agent composed into a repo still LOADS + FOLLOWS that repo's own CLAUDE.md and project skills. Two tiers:

(a) DETERMINISTIC (box-free): compose into a copy of the repo and assert the loading PATH is intact —
    - CLAUDE.md is byte-identical after `convoy add` (UNTOUCHED — not clobbered);
    - convoy wrote an ADDITIVE CLAUDE.local.md that @-imports PERSONA.md + DING-BUS.md, and it COEXISTS with the
      repo CLAUDE.md (CC loads both — the repo instruction is layered, not replaced);
    - the repo's secret (in CLAUDE.md) + the skill's token (in SKILL.md) survive the compose and stay tracked.

(b) LIVE headline (rides the box): the agent, kicked over the bus, produces both from its config alone —
    SECRET.txt = the secret from its repo CLAUDE.md (proves CLAUDE.md loaded + was followed), GREET.txt = the greet
    token via its project skill (proves the skill loaded + fired). Each token is per-run nonce'd and lives ONLY in
    its file body (never in the kick), so a sentinel bearing it is UNGAMEABLE — the agent had no other way to know
    it. Mutation-valid at BOTH layers: (file) a TOKEN-SOURCE check proves the token appears in no agent-visible
    file except its source; (live) a NEGATIVE CONTROL — a repo with a DIFFERENT secret + NO skill, run with the
    SAME kick — MUST NOT emit the real tokens, so a PASS proves the agent READ its own CLAUDE.md/skill (loading),
    not that the token echoed in via the kick/persona/harness.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/ccl  (SHORT path — pty socket ~90-byte limit; use /tmp). A throwaway repo at $SB/repo with its OWN CLAUDE.md (secret token) + a project greet skill (greet token), committed clean."
mechanism = "convoy add --identity ccl --dir <repo> --network <isolated net> --harness claude. Ground truth: convoy leaves the tracked CLAUDE.md UNTOUCHED and writes CLAUDE.local.md (@PERSONA.md + @DING-BUS.md) that CC @-loads alongside it; the project skill auto-loads via --dir. No --plugin-dir needed (project scope)."
tokens = "per-run nonce'd, cos-recognizable prefixes: secret = PURPLE-OTTER-42-<nonce> (only in CLAUDE.md); greet = AHOY-FROM-SKILL-<nonce> (only in the skill body). Never in the kick."
builder = "fixture/setup-sandbox.sh (repo + tokens). fixture/probe.sh (box-free deterministic capture on a repo copy). fixture/spin.sh (live: compose + kick + sentinels). fixture/grade.sh (grades both tiers)."

[grader]
mechanical = """
fixture/grade.sh — REAL state, never a self-report. Hard gates:
  CLAUDE.md UNTOUCHED (det)     — tracked CLAUDE.md byte-identical before/after convoy add (not clobbered).
  CLAUDE.local.md ADDITIVE (det)— convoy wrote CLAUDE.local.md (@-imports PERSONA/DING-BUS) that COEXISTS with the
                                  repo CLAUDE.md (layered, not replaced).
  CONFIG INTACT (det)           — secret still in CLAUDE.md + greet token still in SKILL.md, both still tracked.
  TOKEN-SOURCE (det)            — the per-run secret appears in NO agent-visible file except CLAUDE.md, and the
                                  greet token ONLY in SKILL.md (kick/persona/CLAUDE.local.md/PERSONA.md/DING-BUS.md/
                                  settings all clean) — so a positive sentinel can ONLY be loading, never an echo.
  CLAUDE.md LOADS (live)        — SECRET.txt == the per-run secret (the repo CLAUDE.md loaded + was followed).
  SKILL LOADS (live)            — GREET.txt == the per-run greet token (the project skill loaded + fired).
  NEGATIVE CONTROL (live)       — a CONTROL repo (a DIFFERENT secret, NO greet skill) run with the SAME kick MUST
                                  NOT emit the real tokens (it never saw them). Proves loading at the LIVE layer,
                                  not just the file layer — a PASS cannot come from the token leaking via the kick.
  ISOLATION                     — no ccl/ccln/cclp session in the operator's global pty/convoy root.
The deterministic tier (incl. TOKEN-SOURCE) grades box-free (no LLM); the live headline + negative control ride
the box (WARN/SKIP if not exercised — TOKEN-SOURCE carries the box-free echo proof in that case).
"""

[integrity]
note = """
PASS = the repo's own CLAUDE.md survived the compose untouched, convoy layered CLAUDE.local.md additively, and the
agent produced BOTH per-run tokens from its config alone. The tokens live only in the repo CLAUDE.md / skill body
and are nonce'd per run, so a sentinel bearing one can only come from actually loading that file through the
compose — not from the kick, the persona, or training. A clobbered CLAUDE.md (det) or a missing token (live) fails.
"""

[dependency]
convoy = "convoy add --dir writes an ADDITIVE CLAUDE.local.md (@-imports the persona/ding) alongside the repo's untouched CLAUDE.md; project skills auto-load via --dir. This cell proves + guards that layering."
reuse = "Sentinel-token (ungameable, token only in the file body) pattern: skill-inheritance (#10). Two-tier deterministic-core + live-headline shape + isolated convoy-add: restorability + lib-harness. Sibling: clean-compose (proves the SAME compose adds no repo pollution)."
