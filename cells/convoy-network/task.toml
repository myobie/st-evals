# Cell: convoy-network — the CAPSTONE. `convoy up` hosts a ding-only, no-MCP network END-TO-END: stand up → HOST
# → message → threaded reply, with a mid-run kill the host must RESPAWN. This is the reboot's GO/NO-GO acceptance
# test — it composes the unit cells (bootstrap + ding + resumability) into one end-to-end HOST proof. Fully
# synthetic + hermetic. Binds to `convoy up`'s live interface (PR #10). See README.md + CONVOY-UP-CAPSTONE-DESIGN.md.
id    = "convoy-network"
title = "convoy up hosts a ding-only, no-MCP network end-to-end — the reboot acceptance test"
tier  = 3   # the capstone / integration test (above the unit cells)
axes  = ["hosting", "isolation", "task-success", "autonomy", "coordination", "cost"]

evaluates = """
Whether `convoy up` can stand up + HOST a complete agent network the way the rebooted world will run it: a
FOREGROUND host (TCC anchor + supervisor + respawn owner), ding-only, no MCP, no macOS app, with a real
message→reply loop that closes end-to-end. `convoy add`s a cos (permanent) + worker (ding, no .mcp.json), hosts
them with `convoy up` (which reconciles + respawns gone permanent sessions), seeds a delegate→do→reply task, and
INJECTS a mid-run kill of the worker — the host must RESPAWN it (resuming its session) and the task must still
complete. The genuinely-new gate is RESPAWN OWNERSHIP (the host, not the fixture, brings the worker back — proven
by convoy up's own `--json` respawn event). If this passes, the reboot's hosting model works; if it fails, the
reboot doesn't ship. It composes bootstrap (convoy init/add) + ding (no-MCP loop) + resumability (respawn-resume).
"""

# Frozen world: setup-sandbox.sh `convoy init`s an isolated network + agent dirs + a task token. Fully synthetic —
# its own ST_ROOT ($SB/net), never the operator's live network.
[[repos]]
repo = "net/ (the hosted network) + cos/ + worker/ (agent dirs)"
role = "convoy init's isolated network; convoy up hosts cap-cos (permanent) + cap-wk (ding). worker/ANSWER.txt = the loop's payload."

[team]
cos    = "cap-cos — `convoy add cos` (ding, bypassPermissions, PERMANENT → the respawn target). Delegates + replies to the requester on-thread."
worker = "cap-wk — `convoy add worker` (ding, auto, NO MCP). Reads ANSWER.txt + replies to cos on-thread; must survive the respawn + finish."
host   = "`convoy up` — foreground supervisor + respawn owner (the piece under test)."

[delivery]
path = "DING (no MCP, no app) — `convoy add` is ding-by-default; every agent has NO .mcp.json. The product default / MCP-less config, hosted end-to-end."

# GRADER — parses convoy up's --json event log + the bus.
[grader]
hosted     = "hard: convoy up's `up` event present — the network is hosted by the CLI host."
no_mcp     = "hard: no `.mcp.json` in any agent dir (ding-default)."
no_app     = "hard: no Convoy.app invocation in the host log — the CLI host, not the app."
respawn    = "hard + HELD-OUT + the new gate: a `{type:respawn, identity:cap-wk, ok:true}` event AFTER the injected kill — the HOST (not the fixture) respawned the worker. Resumes its session (ties to resumability)."
loop_closed = "held-out: a reply from cap-cos in cap-req's inbox, THREADED (`in-reply-to` == the seeded kick — reuses ding-reply's discriminator) + carrying the ANSWER.txt token."
flapping   = "v2 probe: crash-loop a session → a `session_flapping` event parks it (the flapping-cap)."

[autonomy]
metric = "rescues to stand up + host + close the loop + survive the respawn — target 0. THE HEADLINE (a human hand-holding convoy up / re-poking the loop = the failure this measures)."

# DEPENDENCY (flag): `convoy up` (the host verb, PR #10). The INSTALLED convoy 0.1.0 (/opt/homebrew/bin) LACKS
# `up` — set CONVOY_BIN to a built/re-published binary until it ships. the convoy maintainer freezes the log-prefix +
# JSON event schema when it lands; this cell binds to that contract. NO-MCP/NO-APP/threaded-reply reuse ding-mode
# / ding-reply; the injector reuses restart-continuity. The ONE new piece is driving convoy up + asserting respawn.
[dependency]
convoy = "convoy up --json (spawn/respawn/session_flapping/teardown JSONL) + --once (deterministic tick); convoy add ding-default (no .mcp.json). Set CONVOY_BIN until convoy up is published to /opt/homebrew/bin."
