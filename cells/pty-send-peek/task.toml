# Cell: pty-send-peek — the POSITIVE pty verb-surface round-trip. Proves `pty send` injects input the
# session's process ACTS on, and `pty peek` returns the session's REAL live output. Deterministic, no LLM.
#
# WHY THIS EXISTS (a real coverage hole). The suite spawns/restarts sessions everywhere (as plumbing) and
# asserts that CROSS-network peek/send is REFUSED (two-networks-coexist, an isolation-negative) — but NOTHING
# grades peek/send as a WORKING capability: does `pty send` actually deliver bytes the process receives, and
# does `pty peek` actually return the live screen? This cell closes that hole with a positive round-trip.
id    = "pty-send-peek"
title = "the pty verb surface works: `pty send` injects input the process acts on + `pty peek` returns the real live output (round-trip)"
tier  = 1
axes  = ["isolation", "task-success"]

evaluates = """
Whether pty's inspect/inject verbs work end-to-end against a real session:

(a) ROUND-TRIP: a session runs a deterministic ACK-reader (prints READY, then "ACK:<line>" for each input
    line). `pty send <id> --seq "<tok>" --seq key:return` injects a RANDOM per-run token; `pty peek --plain`
    then shows "ACK:<tok>". The "ACK:" prefix is emitted by the PROCESS — so a matching ACK proves the process
    RECEIVED + ACTED on the sent bytes (not merely that the terminal echoed them), and that peek returned the
    real live output.

(b) NEGATIVE CONTROL (mutation-valid): a peek taken BEFORE the send does NOT contain "ACK:<tok>". So peek
    reflects real state — the ACK appears only because `pty send` delivered the input — the check isn't an
    always-pass. The token is random per run, so no fixture can pre-bake the expected screen.

(c) SESSION REAL: the scratch PTY_ROOT lists the session — send/peek addressed a real running session, not a
    phantom id.

ISOLATION: the session lives in a scratch PTY_ROOT (`pty --root`), never the operator's global pty registry;
the grader asserts the session is invisible in the global registry. Short root path (unix socket < 104 bytes).
Torn down (kill + rm) at the end. No LLM, no bus, no convoy — pure pty.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/psp  (SHORT path — the pty unix-socket path must stay under 104 bytes). probe.sh spawns the reader in its own scratch PTY_ROOT."
mechanism = "REAL pty verbs: `pty run -d` (detached ACK-reader) → `pty peek --wait READY` → peek (pre, negative control) → `pty send --seq <tok> --seq key:return` → `pty peek --wait ACK:<tok>` + `pty peek --plain` (post). Ground truth = the captured screen. Token random per run. Net-free."
builder = "fixture/probe.sh (spawns the reader, sends a random token, captures the screen before + after). fixture/grade.sh (asserts the round-trip + negative control + isolation from the captured screen). fixture/run.sh = probe then grade (the `evals run` entry). No LLM."

[grader]
mechanical = """
fixture/grade.sh — the session's REAL captured screen, never a self-report. Hard gates:
  SESSION-REAL     — the scratch PTY_ROOT lists the session (send/peek addressed a real running session).
  NEGATIVE-CONTROL — before the send, ACK:<tok> is ABSENT (peek reflects real state; mutation-valid).
  ROUND-TRIP       — after the send, ACK:<tok> is on the peeked screen (send delivered → process acted → peek
                     saw it), independently re-checked against the captured post-send screen (random token).
  ISOLATION        — the session is NOT visible in the operator's global pty registry (--root scoped it).
"""

[dependency]
pty = "pty's send + peek verbs: `pty send <id> --seq <chunk> --seq key:return`, `pty peek --plain [--wait <text> -t N] <id>`, `pty run -d --id`, `pty --root <path>` (== PTY_ROOT), `pty kill`/`rm`. Validated @ pty 0.12.0 (966d2ed)."
reuse = "Scratch-PTY_ROOT isolation + the short-socket-path discipline: two-networks-coexist (which asserts cross-network peek/send is REFUSED — this is its positive complement: peek/send WORK within a session). Deterministic real-command + assert-captured-output + mutation-valid negative-control: the convoy-doctor cells."
