# Cell: convoy-doctor-preinit — a brand-new user's very FIRST `convoy doctor` (before any `convoy init`) gets a
# friendly neutral pointer, NOT a scary failure wall (redesign #63, convoy 3fc9dc32d). On a fresh, never-init'd
# path, `convoy doctor --quick` must exit rc=0 and print the neutral "no network here yet — run convoy init"
# line — and must NOT print the old "✗ named network" / "✗ smalltalk MISSING" blocking wall (which was rc=1).
# Deterministic, no LLM, box-free (--quick spawns no agents). Mutation-valid via the POST-init contrast.
#
# WHY THIS EXISTS (the Johannes first-command UX). "convoy doctor" is the first thing a new user runs to check
# their setup. Pre-#63 a fresh machine got three red ✗ + rc=1 — a failure wall that reads as "convoy is broken"
# when the real answer is "you just haven't run init yet". #63 turns that into a friendly next-step. This cell
# gates that UX so it can't regress back to the scary wall.
id    = "convoy-doctor-preinit"
title = "a fresh user's first `convoy doctor` (pre-init) gets a friendly neutral pointer + rc=0, not the scary failure wall"
tier  = 1
axes  = ["isolation", "task-success"]

evaluates = """
Whether the REAL `convoy doctor --quick` gives a brand-new user a friendly first-command experience BEFORE they
run `convoy init`:

(a) PRE-INIT NEUTRAL: on a FRESH, never-init'd network path, `convoy doctor --quick --network <fresh>` exits rc=0
    and stdout carries the neutral "no network here yet — run convoy init" pointer — and does NOT contain the old
    scary "✗ named network" / "MISSING:" blocking wall. A first run reads as "here's your next step", not "broken".

(b) POST-INIT CONTRAST (mutation-valid): the neutral pointer is PRE-init-specific — a real, `convoy init`'d net
    does NOT print "no network here yet"; it still shows the full "Structure" check list. This proves the pre-init
    line is scoped to fresh nets (the check isn't vacuously always-neutral, and doctor isn't degraded on real nets).

ISOLATION: doctor is scoped with --network <sandbox> and the ambient ST_ROOT/PTY_ROOT/CONVOY_NETWORK are unset (a
bare doctor / ST_ROOT hits the operator's REAL default network). --quick spawns no agents. Never touches the fleet.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/cdp  (SHORT path). probe.sh points doctor at a FRESH uninitialized path + a convoy-init'd net (the contrast), both scoped with --network + a clean env."
mechanism = "REAL `convoy doctor --quick --network <net>` on a fresh path (pre-init) and on a convoy-init'd net (contrast). Ground truth @ convoy #63/3fc9dc32d. Post-init net torn down with convoy down."
builder = "fixture/probe.sh (runs doctor on a fresh + a post-init net, records rc + neutral-line presence + scary-wall absence). fixture/grade.sh (asserts the pre-init neutral + the post-init contrast). No LLM."

[grader]
mechanical = """
fixture/grade.sh — REAL doctor stdout + exit code, never a self-report. Hard gates:
  PRE-INIT-NEUTRAL — fresh-net `convoy doctor --quick` exits rc=0 AND stdout contains the neutral
                     "no network here yet — run convoy init" pointer AND does NOT contain "✗ named network" / "MISSING:".
  POST-INIT-CONTRAST (mutation-valid) — a real init'd net does NOT print the neutral line + still shows the
                     Structure check list (the neutral pointer is scoped to fresh nets, not always-printed).
  ISOLATION        — no doctor session in the operator's global pty root (--network scoped it to the sandbox).
"""

[dependency]
convoy = "convoy doctor's pre-init neutral first-command line (redesign #63, convoy 3fc9dc32d). GREEN once #63 lands. Scope doctor with --network <net> (a bare doctor / ST_ROOT hits the real default net). Gates the Johannes first-command UX so it can't regress to the old rc=1 scary wall."
reuse = "Deterministic real-command + assert-output discipline: the convoy structure/doctor cells. The pre-init-vs-post-init contrast (mutation-valid) mirrors the well-formed-vs-malformed arm of convoy-doctor-structure. Sibling: convoy-doctor-structure (the POST-init narrated structure proof this complements — pre-init neutral here, post-init structure-correct there)."
