# Cell: weird-git-setup — an agent gets working in a MEGAREPO worktree layout (a bare canonical checkout + linked
# worktrees, NOT a plain clone) and must resolve its git context + commit correctly despite it. This is a layout
# run in the real world; this is its acceptance test. Fully SYNTHETIC + hermetic (no real-repo tokens). See README.md +
# the design in the private evals repo (WEIRD-GIT-SETUP-DESIGN.md).
id    = "weird-git-setup"
title = "An agent gets working in a MEGAREPO worktree layout (bare canonical + linked worktrees) — 0 rescues"
tier  = 2   # single-agent, but a layout-detection / substrate eval
axes  = ["autonomy", "task-success", "layout-detection", "isolation", "coordination", "cost"]

evaluates = """
Whether an agent stood up (via `convoy add`) INSIDE a linked git WORKTREE — not a plain clone — can figure out
its git context and get productive despite the megarepo layout. A megarepo is a BARE canonical repo (the object
store + refs) with LINKED WORKTREES as the working checkouts. Naive tooling/agents assume "cwd is a normal clone,
`.git` is a directory" — a worktree breaks both: `.git` is a FILE (a `gitdir:` pointer into the bare repo), the
object store lives elsewhere (shared across worktrees), `rev-parse --show-toplevel`/`--git-dir` return non-obvious
paths, and each worktree is pinned to its own branch. The agent must root-cause a planted bug, keep the suite
green, and COMMIT ITS FIX ON THIS WORKTREE'S BRANCH (`feature`) — not the bare repo, not the sibling `wt/main`.
The headline is AUTONOMY: does the weird layout require human hand-holding (a rescue: "you're in a worktree",
"commit here", "the repo's over there"), or does the agent just handle it? The persona says NOTHING about
worktrees — figuring it out is the discriminator.
"""

# Frozen world: setup-sandbox.sh MATERIALIZES the megarepo (bare canonical + 2 worktrees + a planted bug). Fully
# synthetic (clampkit, a tiny Node lib) — no real-repo/operator tokens. NEVER touches anything outside the sandbox.
[[repos]]
repo = "canonical.git (BARE)"
role = "the shared object store + refs; worktrees link to it. Its `main` must stay UNCHANGED (a commit here = wrong-place)."

[[repos]]
repo = "wt/feature (linked worktree, branch feature)"
role = "the agent's checkout — where it's convoy-added; the fix must land here on `feature`. `.git` is a FILE."

[[repos]]
repo = "wt/main (linked worktree, branch main)"
role = "sibling checkout — must stay clean + untouched (proves no cross-worktree leak over the shared store)."

# The "weird git" traps the agent must resolve (persona gives NO hints about these).
[layout]
dot_git_is_a_file = "in a worktree, `.git` is a `gitdir:` pointer FILE, not a directory"
shared_store      = "the object store lives in the BARE repo, shared across worktrees (`--git-dir` is non-cwd)"
per_worktree_branch = "each worktree is pinned to a branch; a commit must land on THIS worktree's branch"
per_worktree_config = "linked worktrees SHARE config — the fixture enables extensions.worktreeConfig for distinct per-worktree git authors (itself a weird-git subtlety)"

[team]
worker = "a single worker, convoy-added INSIDE wt/feature (`cd wt/feature && convoy add worker --identity wg-dev`). No worktree hints in the persona."
note   = "v1 = one agent gets working in one worktree. v2 (future) = a 2nd agent in wt/main -> cross-worktree isolation over the shared store."

# GRADER — visible-for-dev, held-out-for-grade.
[grader]
visible_tests       = "the project's own suite must go GREEN in the worktree (`node --test`; the planted above-range bug is RED before)"
held_out_acceptance = "the fix is committed ON `feature` (ahead of the seed), authored by the worktree's pinned author, WITH the suite green — AND `main` (bare + sibling wt/main) is UNCHANGED (no leak into the wrong branch/repo/worktree). A layout-probe captures the worktree resolution. A cross-cutting invariant a unit-test edit can't fake."
hermetic            = "runs on the materialized synthetic megarepo in an isolated sandbox — never a real repo."

[autonomy]
metric = "rescues to get working despite the weird git — target 0. A human having to fix the agent's git context / tell it where it is = the failure this cell measures. THE HEADLINE."

[cost]
metric = "tokens + wall-clock (a 'confused by the layout and thrashed' failure inflates it — a signal)."

# DEPENDENCY (flag for the walk): convoy owns the launch-into-a-worktree path. This cell is its acceptance test —
# outcome-level (the agent gets working), robust to how convoy resolves the worktree. CLI-based (convoy init/add):
# NO Convoy.app / menubar / TCC / live fleet needed to build + walk it. The live grade waits only on machine headroom.
[dependency]
convoy = "convoy add launches in the cwd -> `cd wt/feature && convoy add worker` is the worktree launch; this cell grades whatever convoy ships"
