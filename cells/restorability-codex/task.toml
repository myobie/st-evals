# Cell: restorability-codex — the CODEX twin of `restorability`. Proves a CODEX agent also restores WITHOUT
# `--resume`/`--session-id`: a `convoy reload` (fresh transcript, no resume) reconstructs its working state from
# now.md via the CODEX SessionStart hook (smalltalk PR #86), fleet-wide parity with claude.
#
# WHY A TWIN (cos correction #2). Like ghost-bug-codex mirrors ghost-bug cross-family, this mirrors restorability
# for Codex. Its distinct, held-out VALUE is proving the codex SessionStart now.md injection (PR #86) actually
# works — Codex's hook mechanism DIFFERS from claude's (stdout JSON .additionalContext, NOT stderr+exit-2), so
# parity is not free; it must be proven. The now.md restore is the mandate's fleet-wide leg: NO agent family
# depends on --resume.
#
# THIN: reuses restorability's convoy-reload + now.md reconstruct mechanism (= doctor CHECK 4); the only twin-
# specific piece is asserting the CODEX hook's JSON payload. The stuck-queue discriminator is a claude CC-input-
# queue concern and lives ONLY in the claude cell — here NO-QUEUE-CHANNEL is the structural corollary (a fresh
# codex session has no --resume channel), and the headline is the now.md restore parity.
id    = "restorability-codex"
title = "A CODEX agent restores WITHOUT --resume/--session-id: convoy reload reconstructs now.md via the codex SessionStart hook (PR #86 parity)"
tier  = 1
axes  = ["isolation", "task-success", "autonomy"]

evaluates = """
Whether a codex agent cold-restarted with NO --resume/--session-id reconstructs its working state from now.md.
The codex SessionStart hook (examples/codex/session-start.sh, PR #86) emits a JSON payload on STDOUT whose
.additionalContext carries the SAME injected block as the claude hook — <context source="st/context/now.md"
agent="<id>"> — before the inbox snapshot. Two parts:

(a) CODEX-HOOK-EMITS-BLOCK (deterministic, PR #86 parity): run the codex hook against a seeded now.md; assert
    jq .additionalContext contains the marker + the RECONSTRUCT token. Negatives: missing/stale now.md (with an
    empty inbox) => no now.md block. Requires jq (the codex hook hard-deps it) — SKIPS-WITH-REASON if absent.
(b) RECONSTRUCT (live headline): a real cold-reloaded codex worker acts on now.md and writes RECONSTRUCTED.log,
    0 rescues.

Plus the shared deterministic gates: NO-RESUME (the codex reload command carries no --resume/--session-id) and
NO-QUEUE-CHANNEL (fresh-session corollary). A false PASS — a codex hook asserted to inject now.md when it does
not, or a reload that secretly resumed — is worse than a FAIL.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/rlx  (short path; isolated convoy net at $SB/net; a codex worker rlx-wk + a now.md seeded with the RECONSTRUCT token)"
mechanism = "convoy add --harness codex (correct-by-construction: codex session + AGENTS.md + st ding sidecar) then convoy reload (respawns from the stored pty.toml command — no --resume/--session-id => fresh transcript). Same reload mechanism as the claude cell; the harness differs."
hook = "codex SessionStart hook: examples/codex/session-start.sh (stdout JSON .additionalContext). now.md injection landed in smalltalk PR #86 (merged f782411; reference checkout synced to f8592ce — SATISFIED). Marker identical to claude: <context source=\"st/context/now.md\" agent=\"<id>\">. Knobs: ST_REHYDRATE_STALE_S=999999999 bypasses freshness, =0 forces the stale-skip."
builder = "fixture/setup-sandbox.sh (worker repo + now.md with the token). fixture/probe.sh runs the box-free codex-hook + NO-RESUME gates; fixture/spin.sh drives the live convoy reload; fixture/grade.sh gates both."

[grader]
mechanical = """
fixture/grade.sh — REAL run state. Hard gates (deterministic where marked):
  NO-RESUME (det)          — the codex reload respawn command carried NO --resume/--session-id.
  NO-QUEUE-CHANNEL (det)   — fresh-session corollary (no restore channel). (The CC input-queue is a claude-client
                             concern, not seeded here; codex's job is the now.md restore parity.)
  REHYDRATE-WIRED (det)    — codex SessionStart hook resolvable + now.md non-empty with the token.
  CODEX-HOOK-EMITS-BLOCK (det, PR #86) — jq .additionalContext of the codex hook run contains the marker + token;
                             negatives (missing/stale now.md) => no block. SKIPS if jq absent or checkout < #86.
  RECONSTRUCT (live)       — the cold codex agent wrote the now.md token to RECONSTRUCTED.log, 0 rescues.
  ISOLATION (det+live)     — same identity across reload => same git author; PTY_ROOT scoped to the isolated net.
"""

[dependency]
smalltalk = "codex SessionStart now.md injection = PR #86 (merged f782411; reference checkout f8592ce — SATISFIED). The CODEX-HOOK-EMITS-BLOCK gate goes green on a reference checkout >= f782411 and correctly RED-flags an older one (the gate detecting the unsynced state IS the eval working). Requires jq on PATH (the codex hook hard-deps it)."
convoy = "convoy add --harness codex + convoy reload = the codex no-resume cold-restart path. Reuses the claude cell's reload mechanism (thin)."
reuse = "Sibling: cells/restorability (the claude cell) — shared reconstruct mechanism + gate shapes. Cross-family twin pattern: ghost-bug-codex. codex-add scaffolding: lib-harness stev_convoy_add ... codex."
