# inbox-hygiene — exactly-once inbox processing (archive-after-act + resume double-act guard).
id    = "inbox-hygiene"
title = "An agent archives a message the moment it acts, and a re-drain after a cold restart does NOT double-act"
tier  = 1
axes  = ["isolation", "task-success", "autonomy", "cost", "coordination"]

evaluates = """
The exactly-once / inbox-hygiene guarantee (dev-practices §8 + DING-BUS.md): agents park + restart
constantly, and a restart re-drains the inbox — so an un-archived acted-on item gets reprocessed
(double-delegate / double-send / double-merge). ih-agent must (a) append each NEW message's token to a
durable PROCESSED.log then ARCHIVE the message immediately, and (b) on a cold restart that re-delivers an
already-handled message, recognize it (token already in PROCESSED.log) and re-archive WITHOUT re-appending.
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/inbox-hygiene/repo (ih-agent; PROCESSED.log = the countable side-effect)"
fault       = "fixture/inject-restart.sh — after the token lands, re-delivers the same message un-archived + `pty restart -y` cold-boots ih-agent (inbox preserved)"

[grader]
mechanical = """
fixture/grade.sh — REAL STATE only, never self-report. Hard gates: EXACTLY-ONCE (the token appears
exactly 1 time in PROCESSED.log — 0 = never acted, >1 = double-act across the re-drain); ARCHIVE-AFTER-ACT
(inbox empty + item(s) in archive); ISOLATION (only ih-agent authored the ledger). Requires the restart to
have been injected (else the exactly-once claim is untested).
"""
hermetic = "isolated convoy net at $SB/st-root; deterministic token; the countable ledger IS the ground truth."

[reuse]
note = "Shared with convoy doctor as check 2b (exactly-once ON RESTART). Distinct from doctor check 4 (state reconstructs) — 2b asserts no-double-action, not reconstruction. Both cold-restart via pty restart -y; separate checks, shared harness."
