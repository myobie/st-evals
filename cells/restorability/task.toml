# Cell: restorability — an agent RESTORES WITHOUT `--resume`/`--session-id`: a COLD relaunch (no session pin, no
# transcript replay) comes back FUNCTIONAL by rehydrating from durable state (now.md + git + bus), and — the sharp
# part — does NOT inherit stale session state (a stuck CC input-queue) the way a `--resume` restore does.
#
# WHY THIS EXISTS (Nathan mandate). The reboot migration's default is session-PRESERVING (`--resume <pinned-sid>`;
# see the `resumability` cell). A real incident exposed the dark side: a `--resume` respawn RESTORED a stuck Claude
# Code input-queue (a poke that kept replaying after its message was archived), so the agent came back but wedged.
# The mandate: prove agents can restore WITHOUT `--resume`/`--session-id` — a clean cold boot that rebuilds context
# from the durable substrate — so agents don't DEPEND on `--resume` (and its queue-cruft) to survive a restart.
id    = "restorability"
title = "An agent restores WITHOUT --resume/--session-id: a cold relaunch rehydrates from durable state (now.md + git + bus) and inherits NO stuck session-queue"
tier  = 1
axes  = ["isolation", "task-success", "autonomy", "coordination"]

evaluates = """
Two guarantees, one about the MECHANISM and one about the BEHAVIOR, that together make a session-less restore
safe enough that an agent need not rely on `--resume`:

(a) MECHANISM (deterministic, `st launch --dry-run`, no live agent): a no-resume relaunch produces a claude
    command that OMITS `--resume` AND omits `--session-id` — a genuinely fresh process, not a resumed one — while
    the durable substrate the fresh process must rehydrate from is present: an INJECTED now.md (the SessionStart
    hook feeds the agent's working state) plus git + the bus inbox. Complements `resumability` (which proves the
    `--resume` DEFAULT) by proving the OPT-OUT (`--fresh` / no-resume) is a real, self-sufficient path.

(b) BEHAVIOR (live headline, rides the box): an agent COLD-restarted with NO `--resume`/`--session-id` (fresh
    transcript) comes back and (i) reconstructs its working state from now.md + git + bus with 0 human rescues,
    AND (ii) does NOT inherit a stuck input-queue — a pre-restart queued/pending poke does NOT replay after the
    cold boot (the exact failure a `--resume` restore reproduces). The negative control is the discriminator: a
    matched `--resume` restore of the same wedged session DOES carry the stuck queue; the no-resume restore does
    not. That contrast is the whole point — it quantifies why no-resume is the safer restore.

If the no-resume launch secretly kept `--session-id`, or the fresh agent could not rehydrate (empty/absent now.md),
or the cold boot still inherited the stuck queue, the mandate fails and we've found a real gap.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-./.sandbox}/restorability/work  (an agent cwd with a PINNED .claude-session-id + a now.md working-state file + a git repo + a bus inbox holding one already-archived poke = the 'stuck queue' seed)"
seed = "now.md carries a durable working-state token (what the agent was mid-doing); the bus inbox holds a message that is ARCHIVED (handled) — the seed for the stuck-queue replay a --resume restore would carry but a cold boot must not."
substrate = "DELIBERATE: durable state lives ONLY in now.md + git + the bus (no transcript). A cold-restored agent has nothing but these to rehydrate from — exactly the reboot-without-resume path."
builder = "fixture/setup-sandbox.sh (deterministic; validates the pinned session-id + non-empty now.md + green repo on build)"
hooks = "the SessionStart now.md-injection hook (smalltalk) must be present so the cold boot gets its working state — HARD DEPENDENCY on the now.md write-side + injection hardening (smalltalk restorability-hooks work)."

[scenario]
mechanism = """
Deterministic `st launch --dry-run` probes (no live agent, runs anywhere):
  NO-RESUME  — the no-resume/--fresh launch command OMITS `--resume` AND `--session-id` (a fresh process).
  PIN-INTACT — `.claude-session-id` is UNCHANGED after the no-resume probe (opt-out is one-off, not a one-way door).
  REHYDRATE  — the launch injects now.md (the SessionStart hook is wired) so the fresh process has its state.
"""
behavior = """
Live (rides the box): the agent is COLD-restarted with NO --resume/--session-id (kill session; rm
.claude-session-id + pty.toml so there is NO pin and NO transcript; relaunch the SAME identity/persona/repo/bus
under a fresh session-name — the restart-continuity RC_RESTART mechanism, but asserting the launch carried no
--resume). Then:
  FUNCTIONAL — the cold agent knows now.md's working-state token in-context (rehydrated from durable state), 0 rescues.
  NO-STUCK-QUEUE — a pre-restart queued/archived poke does NOT replay to the cold agent (no phantom re-poke).
"""
negative = "MATCHED --resume control: restore the SAME wedged session WITH --resume; it DOES carry the stuck queue (the poke replays). The contrast (no-resume clean vs --resume carries-it) is the headline."

[grader]
mechanical = """
fixture/grade.sh — deterministic mechanism gates + behavioral gates:
  NO-RESUME (hard)   — the no-resume --dry-run command contains neither `--resume` nor `--session-id`.
  PIN-INTACT (hard)  — `.claude-session-id` unchanged after the no-resume probe.
  REHYDRATE (hard)   — now.md is injected into the fresh launch (hook wired) and is non-empty.
  FUNCTIONAL (hard, live) — cold agent demonstrates knowledge of now.md's token with 0 human rescues.
  NO-STUCK-QUEUE (hard, live) — no phantom re-poke reaches the cold agent post-restart.
  CONTRAST (hard) — the --resume control DID carry the stuck queue (proves the test can detect it).
"""
hermetic = "isolated sandbox; the injected restart + startup gates are SCENARIO pokes, not rescues (headline metric = 0 rescues)."

[integrity]
note = """
PASS = a real cold relaunch with NO --resume/--session-id came back functional from now.md+git+bus AND did not
inherit the stuck queue, while the matched --resume control DID inherit it. Not a mocked launch, not a log scrape.
A false PASS (the no-resume command secretly keeps --session-id; asserting rehydration without a real now.md
injection; or a control that can't actually detect the stuck queue) is worse than a FAIL.
"""

[dependency]
smalltalk = "SessionStart now.md-injection hook + the write-side (Stop-flush) that keeps now.md fresh — the ENABLER. This eval is the PROOF that the no-resume path works once those hooks are solid; they should land together."
reuse = "Cold-restart mechanism adapted from restart-continuity (RC_RESTART: rm .claude-session-id + pty.toml, relaunch same identity). Deterministic --dry-run probe adapted from resumability. The stuck-queue assertion is new — it is the incident (a --resume respawn replayed an archived poke) turned into a gate."
