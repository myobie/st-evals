# Cell: restorability — an agent RESTORES WITHOUT `--resume`/`--session-id`. A `convoy reload` (kill + respawn
# from the STORED pty.toml command = fresh transcript, NO --resume/--session-id) comes back FUNCTIONAL by
# reconstructing its working state from now.md (via the SessionStart hook) + git + bus — and, the sharp part,
# inherits NO stale session state (a stuck CC input-queue) the way a `--resume` restore does.
#
# WHY THIS EXISTS (Nathan mandate). The reboot default is being moved OFF session-preservation (`--resume`). A real
# incident exposed why: a `--resume` respawn RESTORED a stuck Claude Code input-queue (a pending/queued keystroke
# that kept replaying after its message was archived), so the agent came back but wedged. `convoy reload` respawns
# from the stored pty.toml command — NO --resume/--session-id, FRESH transcript — so the ONLY way state survives is
# externalization (now.md). This cell is the held-out SUITE form of that guarantee. Nathan's proof, in one line:
# our agents DO NOT use resume AND DO NOT need it.
#
# ARCHITECTURE — build THIN (cos's explicit call). REUSE convoy `doctor` CHECK 4's convoy-reload + SessionStart
# reconstruct MECHANISM (seed now.md -> convoy reload -> SessionStart hook reconstructs -> agent acts). Do NOT
# re-implement that core. doctor CHECK 4 (checkStateExternalization / "restartability thesis") is a per-setup
# READINESS check of that same mechanism; this cell is the GRADED, held-out eval-suite regression guard for it.
# The cell's DISTINCT, held-out VALUE (what doctor lacks) is the TWO incident gates:
#   (a) NO-stuck-queue-inheritance + a matched `--resume` CONTROL that shows the state WOULD survive with resume
#       (the discriminator proves the difference is REAL, not mere absence), and
#   (b) the codex twin (restorability-codex) — proves the codex SessionStart now.md injection (smalltalk PR #86)
#       works fleet-wide, not just claude.
# That trio IS the mandate's proof.
id    = "restorability"
title = "An agent restores WITHOUT --resume/--session-id: convoy reload (fresh transcript) reconstructs work-state from now.md and inherits NO stuck session-queue"
tier  = 1
axes  = ["isolation", "task-success", "autonomy", "coordination"]

evaluates = """
Whether an agent cold-restarted with NO --resume/--session-id survives — reconstructing its working state purely
from externalized durable substrate — and does so WITHOUT inheriting stale session state. Three parts, thin core +
two held-out incident gates:

(a) RECONSTRUCTION (reuses doctor CHECK 4's mechanism; graded as a held-out suite cell): externalize a resume-task
    into now.md; COLD-restart via `convoy reload` (kill + respawn from the stored pty.toml command — NO
    --resume/--session-id, fresh transcript, so externalization is the ONLY path back); the SessionStart hook
    injects now.md and the cold-booted agent ACTS on the task (writes its token), 0 human rescues. If the hook is
    blocked or now.md is empty/absent, reconstruction silently never happens — a real gap the negatives catch.

(b) NO-STUCK-QUEUE (the incident-derived novel gate — the cell's held-out value; two robust arms, per smalltalk's
    research-backed design, so it does NOT depend on the undocumented/version-volatile CC queue format):
      - MECHANISM COROLLARY (deterministic, version-proof): the reload respawn carries NEITHER --resume NOR
        --session-id AND boots a FRESH session-id with NO prior transcript. With no such channel, NO prior-session
        state — the input-queue included — CAN carry. So no-stuck-queue-inheritance is a PROVEN COROLLARY of the
        fresh-session mechanism, not a fragile seeded gate.
      - DISCRIMINATOR (documented transcript-carry PROXY, robust black-box detection): plant a unique codeword ONLY
        in the pinned session's transcript via one REAL claude turn (never by hand-authoring the internal JSONL —
        that is cos's worse-than-FAIL trap). The matched `--resume` CONTROL recalls the codeword (PROVES resume
        inherits session-scoped state — the detection proof cos requires); the reload path does NOT (PROVES cold
        reload sheds it). Gated: skip-with-reason if codeword-recall cannot be established on a given CC version.

(c) CODEX TWIN (restorability-codex): the same now.md reconstruction proven for a codex agent — the codex
    SessionStart hook injects the SAME <context source=...> block (smalltalk PR #86, present in the reference
    checkout at f8592ce — verified). Dependency requires reference smalltalk >= f782411 (#86): SATISFIED. If a
    checkout predates it, the gate correctly RED-flags the gap (the gate DETECTING the unsynced state IS the eval
    working) — so the twin degrades honestly rather than silently passing.

A false PASS — a "reload" that secretly resumed, reconstruction asserted without a real now.md injection, a control
that cannot actually detect the carried state, or a seeded queue that silently stops reproducing the mechanism on
a CC version bump — is worse than a FAIL.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/rl  (short path for the ~104-byte unix-socket limit; isolated convoy net at $SB/net; a worker agent 'rl-wk' with its own git repo + a now.md seeded with a resume-task token)"
mechanism = "convoy reload <id> — kills + respawns the agent from its STORED pty.toml command (NO --resume/--session-id, fresh transcript). Verified ground truth: the materialized pty.toml command is `exec claude --permission-mode bypassPermissions '<cold-boot ritual>'` — no --resume, no --session-id. This is the real reboot restart path; `st launch` is retired. Unlike `pty restart`, reload never ATTACHes, so it works from inside a pty and dodges the env-leak that caused the incident."
seed = "now.md = a durable resume-task ('run this exact command, then stand by') carrying a unique RECONSTRUCT token. The stuck-queue is NOT seeded into the CC input-queue (undocumented + version-dependent + buggy per smalltalk research); the discriminator plants a codeword via a REAL claude turn into the pinned session TRANSCRIPT only (not now.md/git/bus), so --resume recall vs reload-shed is a black-box, version-independent observable."
hooks = "HARD DEPENDENCY (read-side only, per cos correction #4): the SessionStart now.md-injection hook. The fixture SEEDS now.md, so the cell does NOT depend on the undecided write-side (Stop-flush). claude: examples/claude-code/hooks/session-start.sh (stderr + exit 2). codex: examples/codex/session-start.sh (stdout JSON .additionalContext; now.md injection landed in PR #86). Both emit the SAME marker: <context source=\"st/context/now.md\" agent=\"<id>\">."
builder = "fixture/setup-sandbox.sh (deterministic; materializes the worker repo + a non-empty now.md with the RECONSTRUCT token). fixture/probe.sh runs the box-free deterministic gates; fixture/spin.sh drives the live convoy reload + discriminator arms; fixture/grade.sh gates both."

[scenario]
reconstruct = """
convoy init an isolated net; seed $NET/rl-wk/context/now.md with a resume-task (echo a unique token to a log);
convoy add the worker; `convoy reload <id>` (no --resume/--session-id). The cold agent reconstructs from now.md via
the SessionStart hook and writes the token — 0 rescues. Thin: this REUSES doctor checkStateExternalization's
mechanism; the cell just grades it held-out.
"""
no_stuck_queue = """
MECHANISM COROLLARY (deterministic): assert the reload respawn command (the stored pty.toml command) carries no
--resume AND no --session-id AND yields a fresh session-id / no prior transcript — so no prior-session state can
carry. DISCRIMINATOR (live proxy, gated): plant a codeword in the pinned session's transcript via one real claude
turn; the --resume CONTROL recalls it (detection proof) while the fresh reload does NOT (shed proof). If
codeword-recall cannot be established (CC-version drift), the discriminator SKIPS-WITH-REASON — the mechanism
corollary + the functional reconstruct arm still carry the eval (degrade gracefully, never brittle-red).
PLAINLY (cos honest-framing requirement): the discriminator is a DOCUMENTED PROXY on the same restore-channel
property — it is NOT the real CC input-queue. The real queue is deliberately NOT seeded (its persistence is
undocumented / version-dependent / buggy; a hand-authored seed would risk a false PASS). The MECHANISM COROLLARY
is the load-bearing proof; the proxy only demonstrates it via an observable, documented channel.
"""

[grader]
mechanical = """
fixture/grade.sh — REAL run state, never a log-only claim. Hard gates (deterministic, box-free where marked):
  NO-RESUME (det)       — the reload respawn command (stored pty.toml) carried NO --resume AND NO --session-id.
  REHYDRATE-WIRED (det) — the SessionStart hook is wired AND now.md is non-empty with the RECONSTRUCT token.
  HOOK-EMITS-BLOCK (det)— running session-start.sh against the fixture now.md emits the
                          <context source="st/context/now.md" agent="rl-wk"> block CONTAINING the token
                          (correction #1 STRONGER gate). Negatives: missing now.md -> NO block (context lost);
                          stale now.md (ST_REHYDRATE_STALE_S) -> NO block.
  NO-QUEUE-CHANNEL (det) — MECHANISM COROLLARY: reload boots a fresh session-id with no --resume/--session-id and
                          no prior transcript => no channel for a stuck queue to carry.
  RECONSTRUCT (live)    — the cold agent wrote its now.md resume-task token (reconstructed from durable state, 0 rescues).
  DISCRIMINATOR (live, gated) — the --resume control RECALLED the transcript codeword (detection proof) AND the
                          reload path did NOT (shed proof). Skips-with-reason if codeword-recall can't be established.
  ISOLATION (det+live)  — same identity across reload => same git author; PTY_ROOT scoped to the isolated net
                          (nothing leaked to the operator's global pty root).
"""
hermetic = "isolated convoy net + a decoupled short PTY_ROOT; the injected reload + the --resume control are SCENARIO steps, not rescues (headline = 0 rescues). The deterministic gates (NO-RESUME, REHYDRATE-WIRED, HOOK-EMITS-BLOCK, NO-QUEUE-CHANNEL) run box-free."

[integrity]
note = """
PASS = a real no-resume `convoy reload` came back functional by reconstructing now.md (SessionStart hook fired) AND
provably could not inherit a stuck queue (fresh-session corollary), while the matched --resume control DID recall
carried session state (the discriminator's detection proof). Not a mocked reload, not a log scrape, not a
hand-authored CC transcript. APPROVED BY COS (2026-07-13): the queue-inheritance property is proven STRUCTURALLY
(the fresh-session corollary) and DEMONSTRATED via a transcript-codeword PROXY. The eval AND its report MUST STATE
PLAINLY that this is NOT a seeded CC input-queue — that format is undocumented / version-volatile / buggy, so a
fragile hand-authored seed would risk a false PASS (worse than a FAIL); the mechanism-corollary arm logically
covers the queue.
"""

[dependency]
convoy = "convoy reload = the no-resume cold-restart mechanism (respawns from stored pty.toml; verified no --resume/--session-id). Ties to convoy doctor CHECK 4 (checkStateExternalization) — this cell is its held-out suite form + the stuck-queue + codex extensions (thin: reuses the reload core, does not re-implement it)."
smalltalk = "SessionStart now.md-injection hook (read-side) = the ENABLER. claude ships it today; codex ships it in PR #86 (merged to main f782411; reference checkout synced to f8592ce — SATISFIED, verified). The codex twin's now.md gate goes green on any reference checkout >= f782411 and correctly RED-flags an older one (no open fleet-sync step). Marker + knobs (identical on both hooks): <context source=\"st/context/now.md\" agent=\"<id>\">; ST_REHYDRATE_STALE_S=999999999 bypasses freshness, =0 forces the stale-skip."
reuse = "Cold-restart-without-resume + now.md reconstruction: convoy doctor checkStateExternalization. Team/isolation + convoy-add scaffolding: restart-continuity + lib-harness (stev_convoy_add/init/teardown). The --resume-vs-no-resume launch-shape assertion mirrors resumability's --dry-run probe. The stuck-queue discriminator + codex twin are the new, held-out value."
