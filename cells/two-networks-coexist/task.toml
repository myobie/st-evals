# Cell: two-networks-coexist — multi-tenant isolation. Two isolated smalltalk networks run CONCURRENTLY on
# one host and must show ZERO cross-talk on both surfaces: the bus (ST_ROOT) and pty (per-network PTY_ROOT /
# st.network tag). Persona-independent — it grades the SUBSTRATE, not agent judgment. See README.md + the
# design in the private evals repo (TWO-NETWORKS-COEXIST-DESIGN.md).
id    = "two-networks-coexist"
title = "Two isolated smalltalk networks coexist concurrently with ZERO cross-talk (bus + pty)"
tier  = 2   # multi-network substrate eval
axes  = ["isolation", "coordination", "autonomy", "cost"]   # isolation IS the grade; liveness is a positive control

evaluates = """
Whether TWO independent smalltalk networks — two people, or one person's two contexts, or two tenants on a
shared/cloud box — can run CONCURRENTLY on the same host and stay hermetically partitioned: neither network can
enumerate, address, deliver to, or (via pty) see/inject into the other. Every other cell tests isolation WITHIN
one network (an agent stays in its repo lane); this raises the isolation hard-gate to TENANT PARTITION across two
networks — the multi-tenancy promise the system implicitly makes the moment a second network exists on a host,
and which has never been asserted. It is the acceptance test for the pty-isolation work (per-network PTY_ROOT /
st.network tag). Two surfaces can leak: the BUS (ST_ROOT — message bleed / cross-enumeration) and PTY (a shared
pty daemon would let network A `pty ls/peek/send` network B's sessions, bypassing the bus entirely). The sharpest
probe is a SAME-IDENTITY COLLISION (a `cos`/`wk` in BOTH networks): correct isolation keys on root+identity, so a
pass can't be an accident of unique names. PASS = zero cross-talk on every probe, both directions, while both
networks are provably live. A single bleed is a security-relevant FAIL with a repro.
"""

# Two synthetic networks, materialized by setup-sandbox.sh (never the operator's live bus). Persona-free.
[[networks]]
id      = "A"
root    = "$SB/st-root-a"         # ST_ROOT_A
agents  = "sup, wk, beacon-a (A-only, mirror of beacon-b for the both-directions cross-address probe)"   # wk owns repo A-widget
task    = "wk makes a one-line change in A-widget + reports to sup (liveness positive-control)"

[[networks]]
id      = "B"
root    = "$SB/st-root-b"         # ST_ROOT_B
agents  = "sup, wk (SAME identities as A — the collision), beacon-b (B-only, for the cross-address probe)"
task    = "wk makes a one-line change in B-widget + reports to sup (liveness positive-control)"

# ISOLATION — the HARD GATE and the entire point. Zero cross-talk, both directions.
[isolation]
enforce  = "each network is a disjoint ST_ROOT + (per-network) PTY_ROOT; agents bind only their own network"
detect   = "the held-out probe battery (below), run A->B AND B->A after both networks exchange real traffic"
verdict  = "PASS/FAIL gate — a single bleed (message, enumeration, or pty visibility) FAILS the whole run"

# The held-out probe battery (probe-battery.sh). Ungameable: run after both nets are live; both directions.
[[probes]]
id     = "P-enumerate"
action = "in A, `coord agents --json`"
pass   = "lists ONLY A's agents; B's roster + beacon-b absent"

[[probes]]
id     = "P-deliver-collision"
action = "A's sup messages the shared identity `wk`"
pass   = "lands in A's wk inbox; B's wk inbox count UNCHANGED (root+identity keying, not identity-only)"

[[probes]]
id     = "P-cross-address"
action = "from A, attempt to address B-only `beacon-b`"
pass   = "does NOT deliver into B — refused or a dead-letter in A's own root; never reaches $ST_ROOT_B/beacon-b/inbox"

[[probes]]
id     = "P-pty-visibility"
action = "from A's context, list/scope pty sessions"
pass   = "B's sessions not visible/addressable; cross-network pty peek/send refused/filtered (tag) or physically absent (per-network PTY_ROOT)"

[[probes]]
id     = "P-fs-scope"
action = "inspect each root dir"
pass   = "$ST_ROOT_A holds only A's agent dirs; $ST_ROOT_B only B's; no dir bleed"

[grader]
held_out_acceptance = "the probe battery: zero cross-talk on all 5 probes, BOTH directions"
liveness            = "each network independently completed its own seeded task concurrently (its wk committed its one-liner, its sup collected the report) — proves the nets were LIVE during probing (not a trivial two-dead-nets pass)"
teardown            = "ZERO orphans across BOTH networks (double teardown surface; network-scoped stev prefixes -A-/-B-)"

# TWO builds (design fork — build the infra battery FIRST):
#  1. pure-infra probe battery — the harness acts as the agents via shell coord/pty calls (+ cheap `sleep` pty
#     sessions for P-pty-visibility). Deterministic, no `claude` bootstraps -> no machine-load dependency. The gate.
#  2. live-agents concurrency run — real launched agents in both nets doing their tasks, same battery under real
#     load. The demo beat ("two real teams, side by side, never touched"). Env-heavy -> the bare/quiet box.
[builds]
infra  = "deterministic hard gate — buildable + runnable on any box (no claude). BUILD FIRST."
live   = "realistic + demo proof — needs the quiet/bare box (like signal-rename's live grade)."

[autonomy]
metric = "rescues to keep either network alive — target 0 (infra build: N/A; live build: the headline)"

[cost]
metric = "tokens + wall-clock (small — minimal/simulated agents, trivial tasks)"

# DEPENDENCY (flag for the walk): the pty surface (P-pty-visibility) is the pty maintainer's territory —
# per-network PTY_ROOT is MERGED, so this cell is its acceptance test (assert A's pty root has zero record of B's
# sessions). Bus isolation (ST_ROOT) is already proven across all 15 cells -> that half needs no dependency.
[dependency]
pty_owner = "per-network PTY_ROOT (merged) — P-pty-visibility asserts physical partition; coordinate the exact per-network session-scoping call with the pty maintainer"
